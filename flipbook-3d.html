<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  :root{
    --book-max-width: 1100px;
    --book-radius: 6px;

    --turn-duration: 900ms;
    --turn-ease: cubic-bezier(.4,.1,.2,1);

    --spine-width: 28px;
    --edge-shadow: rgba(0,0,0,0.18);
    --inner-shadow: rgba(0,0,0,0.28);
    --page-line: rgba(0,0,0,0.06);

    --img-fade-duration: 220ms;
    --img-fade-ease: ease-out;

    --paper: #fbfaf6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, sans-serif;
    background: radial-gradient(ellipse at center, #3a3f47 0%, #1c1f24 100%);
    min-height: 100vh;
  }

  .book-scene {
    width: 100%;
    height: 78vh;
    display: flex;
    justify-content: center;
    align-items: center;
    perspective: 2400px;
  }

  /* Support / table sur laquelle "repose" le livre, pour renforcer l'illusion 3D */
  .book-pedestal {
    width: min(var(--book-max-width), 95%);
    height: 92%;
    position: relative;
    transform: rotateX(8deg);
    transform-style: preserve-3d;
  }

  .book {
    width: 100%;
    height: 100%;
    display: flex;
    position: relative;
    touch-action: pan-y;
    border-radius: var(--book-radius);
    background: var(--paper);
    overflow: visible;
    transform-style: preserve-3d;
    box-shadow:
      0 30px 60px rgba(0,0,0,0.45),
      0 8px 16px rgba(0,0,0,0.3);
  }

  /* Tranche / pages empilées vues de profil (gauche et droite) pour donner de l'épaisseur au livre */
  .book::before,
  .book::after {
    content: "";
    position: absolute;
    top: 4px;
    bottom: 4px;
    width: 10px;
    background: repeating-linear-gradient(
      180deg,
      #e8e4da 0px, #e8e4da 1.5px,
      #d8d3c6 1.5px, #d8d3c6 3px
    );
    z-index: 0;
  }
  .book::before { left: -8px; border-radius: 4px 0 0 4px; transform: skewY(2deg); box-shadow: inset -2px 0 4px rgba(0,0,0,0.2); }
  .book::after  { right: -8px; border-radius: 0 4px 4px 0; transform: skewY(-2deg); box-shadow: inset 2px 0 4px rgba(0,0,0,0.2); }

  /* Reliure centrale en relief, façon dos de livre cousu */
  .spine {
    position: absolute;
    top: -6px;
    bottom: -6px;
    left: calc(50% - var(--spine-width)/2);
    width: var(--spine-width);
    pointer-events: none;
    z-index: 5;
    background:
      linear-gradient(90deg,
        rgba(0,0,0,0.25) 0%,
        rgba(0,0,0,0.05) 12%,
        rgba(0,0,0,0) 30%,
        rgba(0,0,0,0) 70%,
        rgba(0,0,0,0.05) 88%,
        rgba(0,0,0,0.25) 100%),
      linear-gradient(180deg, rgba(0,0,0,0.15), rgba(0,0,0,0.02) 15%, transparent 50%, rgba(0,0,0,0.02) 85%, rgba(0,0,0,0.15));
    box-shadow:
      inset 0 0 24px rgba(0,0,0,0.35),
      0 0 18px rgba(0,0,0,0.25);
    border-radius: 3px;
  }

  .page {
    width: 50%;
    height: 100%;
    background: var(--paper);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    position: relative;
    z-index: 1;
  }
  .page.left  {
    border-radius: var(--book-radius) 0 0 var(--book-radius);
    transform: rotateY(1.2deg);
    transform-origin: right center;
  }
  .page.right {
    border-radius: 0 var(--book-radius) var(--book-radius) 0;
    transform: rotateY(-1.2deg);
    transform-origin: left center;
  }

  /* Ombre portée au centre, sur la reliure, projetée sur les deux pages */
  .page.left::after,
  .page.right::after {
    content: "";
    position: absolute;
    top: 0;
    bottom: 0;
    width: 60px;
    pointer-events: none;
    z-index: 2;
  }
  .page.left::after {
    right: 0;
    background: linear-gradient(90deg, rgba(0,0,0,0) 0%, var(--edge-shadow) 85%, var(--inner-shadow) 100%);
  }
  .page.right::after {
    left: 0;
    background: linear-gradient(270deg, rgba(0,0,0,0) 0%, var(--edge-shadow) 85%, var(--inner-shadow) 100%);
  }

  /* Ombre douce en haut/bas pour donner du volume (effet papier courbé au repos) */
  .page::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 2;
    background: linear-gradient(180deg, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0) 8%, rgba(0,0,0,0) 92%, rgba(0,0,0,0.05) 100%);
  }

  .page img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    -webkit-user-drag: none;
    user-drag: none;
    pointer-events: none;
    position: relative;
    z-index: 0;
    opacity: 0;
    transition: opacity var(--img-fade-duration) var(--img-fade-ease);
  }
  .page img.is-visible { opacity: 1; }

  /* ===== Feuille animée (tourne-page) =====
     Composée de plusieurs "lattes" verticales pour simuler la courbure
     d'une vraie page (chaque latte tourne avec un angle légèrement
     différent, créant un effet d'arc plutôt qu'un panneau plat). */
  .flip {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 50%;
    z-index: 6;
    transform-style: preserve-3d;
    pointer-events: none;
  }
  .flip-strip {
    position: absolute;
    top: 0;
    bottom: 0;
    height: 100%;
    overflow: hidden;
    background: var(--paper);
    backface-visibility: hidden;
    box-shadow: 0 0 24px rgba(0,0,0,0.25);
  }
  .flip-strip img {
    position: absolute;
    top: 0;
    height: 100%;
    object-fit: contain;
    pointer-events: none;
  }
  /* Ombrage dynamique appliqué à chaque latte pendant la rotation,
     plus sombre côté reliure pour simuler le creux de la courbure */
  .flip-strip .shade {
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, rgba(0,0,0,0.35), rgba(0,0,0,0) 60%);
    opacity: 0;
    transition: opacity var(--turn-duration) var(--turn-ease);
    pointer-events: none;
  }
  .flip.animating .flip-strip .shade { opacity: 1; }

  /* Ombre projetée par la page qui se soulève sur la page restée à plat */
  .lift-shadow {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 38%;
    z-index: 3;
    pointer-events: none;
    background: linear-gradient(90deg, rgba(0,0,0,0.30), rgba(0,0,0,0));
    opacity: 0;
    transition: opacity var(--turn-duration) var(--turn-ease);
  }
  .lift-shadow.from-right { right: 50%; background: linear-gradient(270deg, rgba(0,0,0,0.30), rgba(0,0,0,0)); }
  .lift-shadow.from-left  { left: 50%; }
  .lift-shadow.show { opacity: 1; }

  .controls {
    display: flex;
    justify-content: center;
    gap: 1rem;
    margin: 1.25rem auto;
    align-items: center;
  }
  button {
    padding: 9px 22px;
    border: 1px solid #ccc;
    background: #fff;
    cursor: pointer;
    border-radius: 6px;
    font-size: 0.95rem;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  button:not(:disabled):hover { box-shadow: 0 3px 8px rgba(0,0,0,0.15); transform: translateY(-1px); }
  button:disabled { opacity: 0.4; cursor: default; }
  #indicator { min-width: 130px; text-align: center; color: #444; font-size: 0.9rem; }

  @media (prefers-reduced-motion: reduce) {
    .flip, .flip-strip, .flip-strip .shade, .lift-shadow, .page img { transition: none !important; }
  }
</style>
</head>
<body>

<div class="book-scene" aria-label="Lecteur de livre">
  <div class="book-pedestal">
    <div class="book" role="region" aria-live="polite" id="book">
      <div class="page left"  id="left"  aria-label="Page gauche"></div>
      <div class="spine" aria-hidden="true"></div>
      <div class="page right" id="right" aria-label="Page droite"></div>
      <div class="lift-shadow from-right" id="liftRight" aria-hidden="true"></div>
      <div class="lift-shadow from-left"  id="liftLeft"  aria-hidden="true"></div>
    </div>
  </div>
</div>

<div class="controls">
  <button id="prev" aria-label="Page précédente">← Précédent</button>
  <span id="indicator" aria-live="polite"></span>
  <button id="next" aria-label="Page suivante">Suivant →</button>
</div>

<script>
/* Définissez vos URLs ici (SharePoint/CDN) */
const pageInputs = [
  // Vos URLs d'images ici, dans l'ordre des pages
];

function toUrl(entry) {
  if (typeof entry === "string") return entry;
  if (entry && typeof entry === "object" && typeof entry.url === "string") return entry.url;
  return null;
}
const pageUrls = pageInputs.map(toUrl).filter(Boolean);

/* Construction des vues (couverture, paires internes, dernière) */
function buildViews(urls) {
  const n = urls.length;
  const views = [];
  if (n === 0) return views;

  views.push({ left: null, right: urls[0] }); // Couverture

  let i = 1;
  while (i < n) {
    const left = urls[i] || null;
    const right = urls[i + 1] || null;

    if (left && !right) {
      if (n % 2 === 0) views.push({ left, right: null });
      else views.push({ left: null, right: left });
      break;
    }
    views.push({ left, right });
    i += 2;
  }
  return views;
}
const views = buildViews(pageUrls);

/* Éléments DOM */
const leftEl = document.getElementById("left");
const rightEl = document.getElementById("right");
const prevBtn = document.getElementById("prev");
const nextBtn = document.getElementById("next");
const indicator = document.getElementById("indicator");
const bookEl = document.getElementById("book");
const liftRight = document.getElementById("liftRight");
const liftLeft = document.getElementById("liftLeft");

let viewIndex = 0;
let isAnimating = false;

/* Nombre de "lattes" verticales pour simuler la courbure de la page.
   Plus il y en a, plus l'arc est lisse (mais plus coûteux en perf). */
const STRIP_COUNT = 10;

function imgElem(src, alt) {
  const img = document.createElement("img");
  img.src = src;
  img.alt = alt || "Page";
  img.loading = "lazy";
  img.decoding = "async";
  img.draggable = false;
  img.addEventListener("load", () => {
    requestAnimationFrame(() => img.classList.add("is-visible"));
  });
  img.addEventListener("error", () => {
    console.error("Échec de chargement image:", src);
    img.style.opacity = 0.3;
    img.alt = "Image indisponible";
    img.classList.add("is-visible");
  });
  return img;
}

function clearPage(el) { el.innerHTML = ""; }

function renderStatic() {
  const view = views[viewIndex] || { left: null, right: null };
  clearPage(leftEl);
  clearPage(rightEl);
  if (view.left)  leftEl.appendChild(imgElem(view.left, "Page gauche"));
  if (view.right) rightEl.appendChild(imgElem(view.right, "Page droite"));
  indicator.textContent = views.length ? `Vue ${viewIndex + 1} / ${views.length}` : "Aucune page";
  prevBtn.disabled = viewIndex === 0 || isAnimating;
  nextBtn.disabled = viewIndex >= views.length - 1 || isAnimating;
}

/* Construit la feuille animée découpée en lattes verticales.
   Chaque latte affiche une portion de l'image (via object-position
   décalé) et pivote avec un angle propre, légèrement croissant vers
   la reliure, pour donner l'illusion d'une page qui se courbe en
   "S" pendant le tournage, comme du vrai papier. */
function buildFlipSheet(src, direction) {
  const flip = document.createElement("div");
  flip.className = "flip";
  flip.style.transformStyle = "preserve-3d";

  const stripWidth = 100 / STRIP_COUNT;

  for (let s = 0; s < STRIP_COUNT; s++) {
    const strip = document.createElement("div");
    strip.className = "flip-strip";
    strip.style.width = stripWidth + "%";
    strip.style.left = (s * stripWidth) + "%";
    strip.style.backfaceVisibility = "hidden";

    // Origine de rotation : toujours le bord vers la reliure
    const originSide = direction === "next" ? "left" : "right";
    strip.style.transformOrigin = originSide + " center";

    const img = imgElem(src, "Tourne-page");
    // On affiche toute l'image mais on la recadre par latte
    img.style.width = (STRIP_COUNT * 100) + "%";
    img.style.left = (-s * 100) + "%";
    strip.appendChild(img);

    const shade = document.createElement("div");
    shade.className = "shade";
    strip.appendChild(shade);

    flip.appendChild(strip);
  }
  return flip;
}

/* Anime la rotation de chaque latte avec un angle qui croît
   progressivement (effet d'arc / courbure), via requestAnimationFrame
   plutôt qu'une seule transition CSS, pour un contrôle fin du timing. */
function animateStrips(flip, direction, duration, onDone) {
  const strips = Array.from(flip.querySelectorAll(".flip-strip"));
  const total = strips.length;
  const start = performance.now();

  // Easing globale du tournage
  function easeInOut(t) { return t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2)/2; }

  function frame(now) {
    const elapsed = now - start;
    const t = Math.min(elapsed / duration, 1);
    const eased = easeInOut(t);

    strips.forEach((strip, idx) => {
      // Décalage temporel léger par latte pour créer la courbure :
      // les lattes proches de la reliure tournent un peu plus vite
      // que celles du bord libre, ce qui produit un arc dynamique.
      const proximityToSpine = direction === "next"
        ? idx / (total - 1)        // 0 = bord libre, 1 = près de la reliure
        : 1 - idx / (total - 1);
      const localDelay = proximityToSpine * 0.18; // décalage de phase
      const localT = Math.max(0, Math.min(1, (t - localDelay) / (1 - localDelay)));
      const localEased = easeInOut(localT);

      const angle = direction === "next" ? -180 * localEased : 180 * localEased;

      // Bombement : une légère rotation X additionnelle au milieu du
      // mouvement simule le gonflement de la page qui se courbe.
      const bulge = Math.sin(localEased * Math.PI) * 6; // degrés
      strip.style.transform = `rotateY(${angle}deg) rotateX(${bulge * (proximityToSpine - 0.5) * 0.4}deg)`;

      // Aplatissement de la perspective sur la latte (assombrissement
      // au passage à 90°, simulant un repli du papier)
      const edgeOn = Math.sin(localEased * Math.PI);
      const shade = strip.querySelector(".shade");
      if (shade) shade.style.opacity = String(0.15 + 0.55 * edgeOn);
    });

    if (t < 1) {
      requestAnimationFrame(frame);
    } else {
      onDone && onDone();
    }
  }
  requestAnimationFrame(frame);
}

function animateTurn(direction, onComplete) {
  if (isAnimating) return;
  isAnimating = true;
  prevBtn.disabled = true;
  nextBtn.disabled = true;

  const currentView = views[viewIndex] || {};
  const durationMs = parseFloat(getComputedStyle(document.documentElement)
    .getPropertyValue('--turn-duration')) || 900;

  const hasPage = direction === "next" ? !!currentView.right : !!currentView.left;

  if (!hasPage) {
    onComplete && onComplete();
    isAnimating = false;
    renderStatic();
    return;
  }

  const src = direction === "next" ? currentView.right : currentView.left;
  const flip = buildFlipSheet(src, direction);

  if (direction === "next") {
    flip.style.right = "0";
    liftRight.classList.add("show");
  } else {
    flip.style.left = "0";
    liftLeft.classList.add("show");
  }
  flip.classList.add("animating");
  bookEl.appendChild(flip);

  animateStrips(flip, direction, durationMs, () => {
    flip.remove();
    liftRight.classList.remove("show");
    liftLeft.classList.remove("show");
    onComplete && onComplete();
    isAnimating = false;
    renderStatic();
  });
}

function nextPage() {
  if (isAnimating || viewIndex >= views.length - 1) return;
  animateTurn("next", () => { viewIndex++; });
}
function prevPage() {
  if (isAnimating || viewIndex <= 0) return;
  animateTurn("prev", () => { viewIndex--; });
}

prevBtn.addEventListener("click", prevPage);
nextBtn.addEventListener("click", nextPage);

document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight") nextPage();
  if (e.key === "ArrowLeft")  prevPage();
});

let touchStartX = 0;
bookEl.addEventListener("touchstart", (e) => {
  if (e.touches && e.touches.length === 1) touchStartX = e.touches[0].clientX;
}, { passive: true });

bookEl.addEventListener("touchend", (e) => {
  if (!touchStartX) return;
  const endX = (e.changedTouches && e.changedTouches[0]?.clientX) || 0;
  const dx = endX - touchStartX;
  if (dx < -40) nextPage();
  else if (dx > 40) prevPage();
  touchStartX = 0;
}, { passive: true });

renderStatic();
</script>

</body>
</html>
